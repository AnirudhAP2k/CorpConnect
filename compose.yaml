services:
  # ── Local PostgreSQL Database ──
  db:
    image: pgvector/pgvector:pg15
    container_name: corpconnect-db
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME}
      POSTGRES_USER: ${LOCAL_DB_USER}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER} -d ${LOCAL_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis Cache & PubSub ──
  redis:
    image: redis:7-alpine
    container_name: corpconnect-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Database Migrations ──
  db-migrate:
    build:
      context: .
      target: migrate
    container_name: corpconnect-db-migrate
    entrypoint: [ "/bin/sh", "entrypoint.sh" ]
    command: [ "echo", "Database migrations completed successfully" ]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${LOCAL_DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js Server (Standalone) ──
  server:
    build:
      context: .
      args:
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
        LV_SERVICE_URL: ${LV_SERVICE_URL}
    container_name: corpconnect-server
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      REDIS_URL: redis://redis:6379
      # To use local Compose DB, set DATABASE_URL in your .env:
      DATABASE_URL: ${LOCAL_DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  # ── WebSocket Service ──
  ws-service:
    build:
      context: ./ws-service
    container_name: corpconnect-ws
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - ./ws-service/.env
    environment:
      WS_PORT: 4000
      NODE_ENV: ${NODE_ENV}
      REDIS_URL: redis://redis:6379
      NEXTJS_URL: ${NEXTJS_URL:-http://server:3000}
    depends_on:
      redis:
        condition: service_healthy

  # ── LiveKit Service ──
  lv-service:
    build:
      context: ./lv-service
    container_name: corpconnect-lv
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./lv-service/.env
    environment:
      LV_PORT: 5000
      NODE_ENV: ${NODE_ENV}
      NEXTJS_URL: ${NEXTJS_URL:-http://server:3000}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
      # LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      # LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    depends_on:
      redis:
        condition: service_healthy

  # ── AI Service (FastAPI) ──
  ai-service:
    build:
      context: ./ai-service
    container_name: corpconnect-ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      # To use local Compose DB, set DATABASE_URL in your .env:
      DATABASE_URL: ${LOCAL_DATABASE_URL}
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  # ── N8N Workflow Automation ──
  n8n:
    image: n8nio/n8n:latest
    container_name: corpconnect-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_ADMIN_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_ADMIN_PASSWORD:-changeme}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${DB_HOST}
      - DB_POSTGRESDB_PORT=${DB_PORT}
      - DB_POSTGRESDB_DATABASE=${DB_NAME}
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_BASE_URL:-http://localhost:5678}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

