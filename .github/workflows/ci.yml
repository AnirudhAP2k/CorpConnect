name: CI Checks

on:
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  # ── Node.js Services (Next.js + WS + LiveKit) ──
  node-quality:
    name: Node.js — Quality & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'app/**'
              - 'components/**'
              - 'domain/**'
              - 'lib/**'
              - 'prisma/**'
              - 'ws-service/**'
              - 'lv-service/**'
              - 'next.config.ts'
              - 'tsconfig.json'

      - name: Set up PNPM
        if: steps.filter.outputs.node == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        if: steps.filter.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        if: steps.filter.outputs.node == 'true'
        run: pnpm install

      - name: Run ESLint
        if: steps.filter.outputs.node == 'true'
        run: pnpm run lint

      - name: TypeScript Type Check
        if: steps.filter.outputs.node == 'true'
        run: pnpm tsc --noEmit

      - name: Validate Prisma Schema
        if: steps.filter.outputs.node == 'true'
        run: pnpm prisma validate

      - name: Generate Prisma Client
        if: steps.filter.outputs.node == 'true'
        run: pnpm prisma generate

      - name: Build
        if: steps.filter.outputs.node == 'true'
        run: pnpm run build

      - name: Run Tests
        if: steps.filter.outputs.node == 'true'
        run: pnpm test

  # ── Python AI Service ──
  python-quality:
    name: Python AI — Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'ai-service/**'

      - name: Set up Python
        if: steps.filter.outputs.python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        if: steps.filter.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -r ai-service/requirements.txt

      - name: Run Ruff Linter
        if: steps.filter.outputs.python == 'true'
        run: ruff check ai-service/

      - name: Run Mypy Type Check
        if: steps.filter.outputs.python == 'true'
        run: mypy ai-service/ --ignore-missing-imports

      - name: Run Pytest
        if: steps.filter.outputs.python == 'true'
        run: pytest ai-service/ -v